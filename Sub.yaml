# url 里填写自己的订阅,名称不能重复
proxy-providers:
  Sub:
    url:: "订阅"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

ipv6: false
mode: rule
external-controller: ""
mixed-port: 7890
socks-port: 7891
port: 7892
redir-port: 0
tproxy-port: 0
allow-lan: false
unified-delay: true
tcp-concurrent: true
log-level: info
find-process-mode: strict
bind-address: "*"
lan-allowed-ips:
  - 0.0.0.0/0
  - ::/0
lan-disallowed-ips: []
authentication: []
skip-auth-prefixes:
  - 127.0.0.1/32

tun:
  enable: true
  device: Mihomo
  stack: mixed
  auto-route: true
  auto-redirect: false
  auto-detect-interface: true
  dns-hijack:
    - any:53
  route-exclude-address: []
  mtu: 1500

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*"
    - +.lan
    - +.local
    - time.*.com
    - ntp.*.com
    - +.market.xiaomi.com
  use-hosts: false
  use-system-hosts: false
  default-nameserver:
    - tls://223.5.5.5
  nameserver:
    - https://120.53.53.53/dns-query
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://120.53.53.53/dns-query
    - https://223.5.5.5/dns-query
  direct-nameserver: []

sniffer:
  enable: true
  parse-pure-ip: true
  force-dns-mapping: true
  override-destination: false
  sniff:
    HTTP:
      ports:
        - 80
        - 443
      override-destination: false
    TLS:
      ports:
        - 443
  skip-domain:
    - +.push.apple.com
  skip-dst-address:
    - 91.105.192.0/23
    - 91.108.4.0/22
    - 91.108.8.0/21
    - 91.108.16.0/21
    - 91.108.56.0/22
    - 95.161.64.0/20
    - 149.154.160.0/20
    - 185.76.151.0/24
    - 2001:67c:4e8::/48
    - 2001:b28:f23c::/47
    - 2001:b28:f23f::/48
    - 2a0a:f280:203::/48

profile:
  store-selected: true
  store-fake-ip: true
geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
  geosite: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  mmdb: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb
  asn: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb

proxy-groups:
  - name: Proxies
    type: select
    include-all: true
    proxies:
      - 日本
      - 香港
      - 台湾
      - 韩国
      - 美国
      - 新加坡

  - name: Other
    type: select
    include-all: true
    proxies:
      - Proxies
      - DIRECT

  - name: Domestic
    type: select
    proxies:
      - DIRECT
      - Proxies

  - name: Adblock
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: Ai
    type: select
    include-all: true
    exclude-filter: "(?i)港|hk|hongkong|hong kong"
    proxies:
      - 美国
      - 日本
      - 台湾
      - 新加坡

  - name: Apple
    type: select
    proxies:
      - DIRECT
      - Proxies

  - name: CMedia
    type: select
    proxies:
      - DIRECT
      - Proxies

  - name: GMedia
    type: select
    include-all: true
    proxies:
      - 日本
      - 香港
      - 台湾
      - 韩国
      - 美国
      - 新加坡

  - name: Google
    type: select
    include-all: true
    proxies:
      - 美国
      - 日本
      - 香港
      - 台湾
      - 韩国
      - 新加坡

  - name: GitHub
    type: select
    include-all: true
    proxies:
      - 日本
      - 香港
      - 台湾
      - 韩国
      - 美国
      - 新加坡

  - name: Telegram
    type: select
    include-all: true
    proxies:
      - 日本
      - 香港
      - 台湾
      - 韩国
      - 美国
      - 新加坡

  - name: Microsoft
    type: select
    proxies:
      - DIRECT
      - Proxies

  - name: Steam
    type: select
    proxies:
      - DIRECT
      - Proxies

  #分隔,下面是地区分组
  - name: 日本
    type: url-test
    include-all: true
    filter: "(?i)日本|jp|japan"
    interval: 300
    tolerance: 50

  - name: 香港
    type: url-test
    include-all: true
    filter: "(?i)港|hk|hongkong|hong kong"
    interval: 300
    tolerance: 50
          
  - name: 台湾
    type: url-test
    include-all: true
    filter: "(?i)台|tw|taiwan"
    interval: 300
    tolerance: 50

  - name: 韩国
    type: url-test
    include-all: true
    filter: "(?i)韩|首尔|kr|korea"
    interval: 300
    tolerance: 50

  - name: 美国
    type: url-test
    include-all: true
    filter: "(?i)美|us|unitedstates|united states"
    interval: 300
    tolerance: 50

  - name: 新加坡
    type: url-test
    include-all: true
    filter: "(?i)(新|狮城|sg|singapore)"
    interval: 300
    tolerance: 50

  - name: GLOBAL
    type: select
    include-all: true
    proxies:
      - 日本
      - 香港
      - 台湾
      - 韩国
      - 美国
      - 新加坡

