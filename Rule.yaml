proxy-groups:
  - name: Proxies
    type: select
    include-all: true
    proxies:
      - 日本
      - 香港
      - 台湾
      - 韩国
      - 美国
      - 新加坡

  - name: Other
    type: select
    include-all: true
    proxies:
      - Proxies
      - DIRECT

  - name: Domestic
    type: select
    proxies:
      - DIRECT
      - Proxies

  - name: Adblock
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: Ai
    type: select
    include-all: true
    exclude-filter: "(?i)港|hk|hongkong|hong kong"
    proxies:
      - 美国
      - 日本
      - 台湾
      - 新加坡

  - name: Apple
    type: select
    proxies:
      - DIRECT
      - Proxies

  - name: CMedia
    type: select
    proxies:
      - DIRECT
      - Proxies

  - name: GMedia
    type: select
    include-all: true
    proxies:
      - 日本
      - 香港
      - 台湾
      - 韩国
      - 美国
      - 新加坡

  - name: Google
    type: select
    include-all: true
    proxies:
      - 美国
      - 日本
      - 香港
      - 台湾
      - 韩国
      - 新加坡

  - name: GitHub
    type: select
    include-all: true
    proxies:
      - 日本
      - 香港
      - 台湾
      - 韩国
      - 美国
      - 新加坡

  - name: Telegram
    type: select
    include-all: true
    proxies:
      - 日本
      - 香港
      - 台湾
      - 韩国
      - 美国
      - 新加坡

  - name: Microsoft
    type: select
    proxies:
      - DIRECT
      - Proxies

  - name: Steam
    type: select
    proxies:
      - DIRECT
      - Proxies

  #分隔,下面是地区分组
  - name: 日本
    type: url-test
    include-all: true
    filter: "(?i)日本|jp|japan"
    interval: 300
    tolerance: 50

  - name: 香港
    type: url-test
    include-all: true
    filter: "(?i)港|hk|hongkong|hong kong"
    interval: 300
    tolerance: 50
          
  - name: 台湾
    type: url-test
    include-all: true
    filter: "(?i)台|tw|taiwan"
    interval: 300
    tolerance: 50

  - name: 韩国
    type: url-test
    include-all: true
    filter: "(?i)韩|首尔|kr|korea"
    interval: 300
    tolerance: 50

  - name: 美国
    type: url-test
    include-all: true
    filter: "(?i)美|us|unitedstates|united states"
    interval: 300
    tolerance: 50

  - name: 新加坡
    type: url-test
    include-all: true
    filter: "(?i)(新|狮城|sg|singapore)"
    interval: 300
    tolerance: 50

  - name: GLOBAL
    type: select
    include-all: true
    proxies:
      - 日本
      - 香港
      - 台湾
      - 韩国
      - 美国
      - 新加坡

