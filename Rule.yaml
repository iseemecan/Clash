proxy-groups:
  - name: Proxies
    type: select
    proxies:
      - 日本
      - 韩国
      - 台湾
      - 香港
      - 美国
      - 新加坡
      - Select
      - DIRECT

  - name: Select
    include-all: true
    type: select

  - name: Other
    type: select
    proxies:
      - Proxies
      - DIRECT
      - Select

  - name: Domestic
    type: select
    proxies:
      - DIRECT
      - Proxies
      - Select

  - name: Adblock
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: Ai
    type: select
    proxies:
      - 美国
      - 日本
      - 台湾
      - 新加坡
      - Select

  - name: CMedia
    type: select
    proxies:
      - DIRECT
      - Proxies
      - Select

  - name: GMedia
    type: select
    proxies:
      - 日本
      - 韩国
      - 台湾
      - 香港
      - 美国
      - 新加坡
      - Select

  - name: Google
    type: select
    proxies:
      - 美国
      - 日本
      - 韩国
      - 台湾
      - 香港
      - 新加坡
      - Select

  - name: GitHub
    type: select
    proxies:
      - 日本
      - 韩国
      - 台湾
      - 香港
      - 美国
      - 新加坡
      - Select

  - name: Telegram
    type: select
    proxies:
      - 日本
      - 韩国
      - 台湾
      - 香港
      - 美国
      - 新加坡
      - Select

  - name: Microsoft
    type: select
    proxies:
      - DIRECT
      - Proxies
      - Select

  - name: Steam
    type: select
    proxies:
      - DIRECT
      - Proxies
      - Select

  - name: 日本
    include-all: true
    filter: (?i)日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan
    type: url-test
    interval: 300
    tolerance: 50

  - name: 韩国
    include-all: true
    filter: (?i)KR|Korea|KOR|首尔|韩
    type: url-test
    interval: 300
    tolerance: 50

  - name: 台湾
    include-all: true
    filter: (?i)台|新北|彰化|TW|Taiwan
    type: url-test
    interval: 300
    tolerance: 50

  - name: 香港
    include-all: true
    filter: (?i)港|HK|hk|Hong Kong|HongKong|hongkong
    type: url-test
    interval: 300
    tolerance: 50

  - name: 美国
    include-all: true
    filter: (?i)美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|西雅图|芝加哥|US|United States
    type: url-test
    interval: 300
    tolerance: 50

  - name: 新加坡
    include-all: true
    filter: (?i)新加坡|坡|狮城|SG|Singapore
    type: url-test
    interval: 300
    tolerance: 50

